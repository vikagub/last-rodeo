<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Письмо крупным планом на деревянном столе">
  <defs>
    <linearGradient id="skyGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9c878"/>
      <stop offset="0.42" stop-color="#9e5b2f"/>
      <stop offset="1" stop-color="#24120b"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" x2="1">
      <stop offset="0" stop-color="#3b2114"/>
      <stop offset="0.28" stop-color="#6d3f23"/>
      <stop offset="0.62" stop-color="#8b5a33"/>
      <stop offset="1" stop-color="#30180e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff0c9"/>
      <stop offset="0.55" stop-color="#d8b176"/>
      <stop offset="1" stop-color="#8f6233"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b3382c"/>
      <stop offset="1" stop-color="#5a1111"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#160803" flood-opacity="0.5"/>
    </filter>
    <filter id="paperGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" seed="17"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09"/>
      </feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="sun" cx="52%" cy="18%" r="54%">
      <stop offset="0" stop-color="#ffe2a2" stop-opacity="0.58"/>
      <stop offset="0.34" stop-color="#f2a85f" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#1d0d08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#skyGlow)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>

  <g opacity="0.18">
    <circle cx="240" cy="145" r="4" fill="#fff4cf"/>
    <circle cx="378" cy="228" r="3" fill="#fff4cf"/>
    <circle cx="1250" cy="166" r="3" fill="#fff4cf"/>
    <circle cx="1096" cy="285" r="5" fill="#fff4cf"/>
    <circle cx="704" cy="144" r="3" fill="#fff4cf"/>
  </g>

  <g transform="translate(0 260)">
    <path d="M0 135 C180 80 295 110 455 68 C622 24 763 40 900 82 C1080 137 1232 88 1600 20 L1600 640 L0 640 Z" fill="#1e120c" opacity="0.52"/>
    <path d="M0 185 C210 122 338 158 500 112 C650 70 796 76 950 118 C1110 162 1264 126 1600 82 L1600 640 L0 640 Z" fill="#120a06" opacity="0.42"/>
  </g>

  <g transform="translate(-60 410) rotate(-3)">
    <rect x="0" y="0" width="1720" height="620" fill="url(#wood)"/>
    <g opacity="0.34">
      <path d="M0 64 H1720" stroke="#1d0d07" stroke-width="6"/>
      <path d="M0 188 H1720" stroke="#1d0d07" stroke-width="5"/>
      <path d="M0 312 H1720" stroke="#1d0d07" stroke-width="6"/>
      <path d="M0 436 H1720" stroke="#1d0d07" stroke-width="5"/>
      <path d="M0 558 H1720" stroke="#1d0d07" stroke-width="7"/>
    </g>
    <g opacity="0.16" stroke="#f5be73" stroke-width="2" fill="none">
      <path d="M90 42 C190 80 285 25 405 66 C548 116 666 42 812 82"/>
      <path d="M134 250 C290 190 440 274 612 222 C788 168 920 254 1054 206"/>
      <path d="M1005 386 C1154 332 1324 420 1488 366"/>
      <path d="M410 516 C535 468 662 540 790 494"/>
    </g>
  </g>

  <g filter="url(#softShadow)" transform="translate(420 190) rotate(-7)">
    <rect x="0" y="0" width="690" height="440" rx="16" fill="url(#paper)"/>
    <rect x="32" y="32" width="626" height="376" rx="10" fill="#ffe6b3" opacity="0.5"/>
    <path d="M20 24 L345 250 L670 24" fill="none" stroke="#8d5a2c" stroke-width="7" opacity="0.26"/>
    <path d="M22 418 L272 210" fill="none" stroke="#8d5a2c" stroke-width="6" opacity="0.18"/>
    <path d="M668 418 L420 210" fill="none" stroke="#8d5a2c" stroke-width="6" opacity="0.18"/>
    <circle cx="346" cy="251" r="52" fill="url(#seal)"/>
    <path d="M319 252 C326 220 365 220 372 252" fill="none" stroke="#f0b65c" stroke-width="8" stroke-linecap="round"/>
    <path d="M319 252 L309 238 M372 252 L383 238" stroke="#f0b65c" stroke-width="6" stroke-linecap="round"/>
    <rect x="0" y="0" width="690" height="440" rx="16" fill="transparent" filter="url(#paperGrain)"/>
  </g>

  <g transform="translate(1040 330) rotate(13)" filter="url(#softShadow)">
    <ellipse cx="118" cy="128" rx="132" ry="64" fill="#2b160d" opacity="0.32"/>
    <path d="M94 40 C28 48 2 106 25 165 C48 224 104 251 160 226 C213 203 239 150 221 98" fill="none" stroke="#c8c0b4" stroke-width="28" stroke-linecap="round"/>
    <path d="M96 40 C33 48 7 104 30 163 C52 218 106 243 158 220 C205 200 230 151 214 101" fill="none" stroke="#5f5a55" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <circle cx="51" cy="178" r="8" fill="#2b2926"/>
    <circle cx="75" cy="203" r="8" fill="#2b2926"/>
    <circle cx="197" cy="111" r="8" fill="#2b2926"/>
    <circle cx="216" cy="141" r="8" fill="#2b2926"/>
  </g>

  <g transform="translate(200 548) rotate(-16)" opacity="0.72">
    <path d="M0 22 C160 -20 310 -8 478 24" stroke="#2a130a" stroke-width="26" stroke-linecap="round"/>
    <path d="M12 20 C160 -10 312 2 466 28" stroke="#9a6a3d" stroke-width="8" stroke-linecap="round"/>
  </g>

  <rect y="610" width="1600" height="290" fill="url(#skyGlow)" opacity="0.56"/>
  <rect y="645" width="1600" height="255" fill="#110703" opacity="0.38"/>
</svg>
